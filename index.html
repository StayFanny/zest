function getHaarwasserLabel(){
  // Feb 23, 2026 = A, Feb 24 = B, Feb 25 = A, etc.
  const ref=new Date(2026,1,23),now=new Date();
  ref.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const diff=Math.round((now-ref)/(86400000));
  return diff%2===0?"Haarwasser A 💆‍♀️":"Haarwasser B 💆‍♀️";
}

function genTipsList(){
  const tm=getTm(),tw=getTw(),g=S.cfg.cal,mg=S.cfg;
  const tc=tm.reduce((s,m)=>s+m.cal,0),tp=tm.reduce((s,m)=>s+m.protein,0);
  const tb=tw.reduce((s,w)=>s+w.cal,0),net=tc-tb,rem=g-net,tips=[];
  if(!tm.length&&!tw.length){tips.push("🌅 Guten Start! Vergiss nicht, dein Frühstück zu loggen.");tips.push(TIPS[Math.floor(Math.random()*TIPS.length)]);return tips}
  if(tb>0)tips.push("🔥 "+Math.round(tb)+" kcal verbrannt! Mehr Spielraum.");
  const pct=net/g*100;
  if(pct>110)tips.push("⚠️ "+Math.round(net-g)+" kcal über Ziel. Kein Stress!");
  else if(pct>90)tips.push("🎯 Im Zielbereich – weiter so!");
  else if(rem>500)tips.push("🍽️ Noch ~"+Math.round(rem)+" kcal übrig.");
  else if(rem>0)tips.push("✨ Fast geschafft! Noch ~"+Math.round(rem)+" kcal.");
  if(mg.protein>0&&tp<mg.protein*.5&&pct>50)tips.push("💪 Protein: "+Math.round(tp)+"g/"+mg.protein+"g.");
  tips.push(TIPS[Math.floor(Date.now()/3600000)%TIPS.length]);
  const h=new Date().getHours();
  if(h>=18&&h<20)tips.push("🌙 Die Küche darf bald schließen!");
  if(h>=20){const et=["🌙 Ab jetzt nichts mehr essen!","🛌 Küche zu! Trink einen Tee.","✨ Du brauchst den Abend-Snack nicht.","💤 3h vor Schlafen nix essen = besserer Schlaf!"];tips.push(et[Math.floor(Date.now()/86400000)%et.length])}
  return tips.slice(0,4);
}

// ─── Speech Recognition ───
let recognition=null;
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  recognition=new SR();recognition.lang="de-AT";recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=e=>{
    const text=e.results[0][0].transcript.toLowerCase().trim();
    S.listening=false;S.speechText=text;
    parseSpeech(text);
  };
  recognition.onerror=()=>{S.listening=false;render()};
  recognition.onend=()=>{if(S.listening){S.listening=false;render()}};
  return recognition;
}
function startListening(){
  if(!recognition)initSpeech();
  if(!recognition){alert("Spracherkennung nicht verfügbar");return}
  S.listening=true;render();
  try{recognition.start()}catch(e){S.listening=false;render()}
}
function parseSpeech(text){
  // Extract quantity: "250 gramm tofu" → qty=250, rest="tofu"
  // "eine banane" → qty=1, "halbe pizza" → qty=0.5, "zwei eier" → qty=2
  let qty=null,rest=text;
  const numWords={"eine":1,"einen":1,"ein":1,"zwei":2,"drei":3,"vier":4,"fünf":5,"sechs":6,"halbe":0.5,"halber":0.5,"halbes":0.5};
  // Try number + unit first: "250 gramm", "200 ml", "2 stück"
  const numMatch=text.match(/(\d+[\.,]?\d*)\s*(gramm|g|ml|stück|stk|portion|port)?\s*(.*)/i);
  if(numMatch){qty=parseFloat(numMatch[1].replace(",","."));rest=numMatch[3]||""}
  else{
    // Try word numbers: "eine banane", "halbe pizza"
    const words=text.split(/\s+/);
    for(let i=0;i<words.length;i++){
      if(numWords[words[i]]!==undefined){qty=numWords[words[i]];rest=words.slice(i+1).join(" ");break}
    }
  }
  // Clean rest
  rest=rest.replace(/^(von der|von|vom|mit|und)\s+/i,"").trim();
  if(!rest&&!qty){render();return}
  // Find best food match
  let bestFood=null,bestScore=0;
  const search=rest.toLowerCase();
  FOODS.forEach(f=>{
    const fn=f.name.toLowerCase().replace(/[🥡🍕🌯🍟🥩🍗🥙🍔🥗🫔🍝🍣]/g,"").trim();
    // Exact match
    if(fn===search){bestFood=f;bestScore=100;return}
    // Contains
    if(fn.includes(search)||search.includes(fn)){
      const score=search.length/fn.length*50+50;
      if(score>bestScore){bestFood=f;bestScore=score}
    }
    // Word overlap
    const sw=search.split(/\s+/),fw=fn.split(/\s+/);
    const overlap=sw.filter(w=>fw.some(f2=>f2.includes(w)||w.includes(f2))).length;
    if(overlap>0){const score=overlap/Math.max(sw.length,fw.length)*60;if(score>bestScore){bestFood=f;bestScore=score}}
  });
  if(bestFood){
    // Calculate qty for this food
    let finalQty=qty;
    if(finalQty===null)finalQty=bestFood.baseG;
    else if(bestFood.unit==="g"||bestFood.unit==="ml"){/* qty is already in g/ml */}
    else{/* qty is pieces/portions */finalQty=qty}
    S.portionFood=bestFood;S.portionQty=String(finalQty);S.view="add";
  } else {
    S.search=rest;S.view="add";
  }
  render();
}

// ─── Focus Management ───
let focusInfo=null;
function saveFocus(){
  const el=document.activeElement;
  if(el&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA")){
    focusInfo={fid:el.dataset.fid||null,start:el.selectionStart,end:el.selectionEnd,val:el.value};
  } else focusInfo=null;
}
function restoreFocus(){
  if(!focusInfo||!focusInfo.fid)return;
  setTimeout(()=>{
    const el=document.querySelector('[data-fid="'+focusInfo.fid+'"]');
    if(el){el.focus();try{el.setSelectionRange(focusInfo.start,focusInfo.end)}catch(e){}}
    focusInfo=null;
  },0);
}

// ─── Render ───
function h(tag,props,...ch){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return el;
}

    const modal=h("div",{className:"modal-content",onClick:e=>e.stopPropagation()},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("h3",{style:{fontSize:"16px",fontWeight:800}},f.name),
        h("button",{style:{background:"none",border:"none",fontSize:"22px"},onClick:()=>{
          S.favs=S.favs.includes(f.name)?S.favs.filter(x=>x!==f.name):[...S.favs,f.name];render();
        }},S.favs.includes(f.name)?"⭐":"☆")
      )
    );
    const qtyRow=h("div",{style:{display:"flex",alignItems:"center",gap:"12px",margin:"16px 0"}});
    const qInp=h("input",{type:"number",value:S.portionQty||"",placeholder:String(f.baseG),"data-fid":"portion-qty",style:{width:"90px",padding:"12px",border:"2px solid "+C.primary,borderRadius:"12px",fontSize:"18px",fontWeight:700,textAlign:"center",fontFamily:"inherit"}});
    qInp.addEventListener("input",e=>{S.portionQty=e.target.value;
      const q2=Number(S.portionQty)||f.baseG,n2=calcFood(f,q2);
      const nd=document.getElementById("portion-nutr");
      if(nd)nd.innerHTML=[["🔥",n2.cal+" kcal"],["P",n2.protein+"g"],["C",n2.carbs+"g"],["F",n2.fat+"g"]].map(([l,v])=>`<div style="text-align:center"><div style="font-size:11px;color:${C.textLight}">${l}</div><div style="font-size:14px;font-weight:700">${v}</div></div>`).join("");
    });
    qtyRow.appendChild(qInp);qtyRow.appendChild(h("span",{style:{fontSize:"16px",fontWeight:600,color:C.textLight}},f.unit));
    modal.appendChild(qtyRow);

    const nutrRow=h("div",{id:"portion-nutr",style:{display:"flex",justifyContent:"space-around",padding:"12px 0",background:"#E8F5E9",borderRadius:"12px",marginBottom:"16px"}});
    [["🔥",nutr.cal+" kcal"],["P",nutr.protein+"g"],["C",nutr.carbs+"g"],["F",nutr.fat+"g"]].forEach(([l,v])=>{
      nutrRow.appendChild(h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:"11px",color:C.textLight}},l),h("div",{style:{fontSize:"14px",fontWeight:700}},v)));
    });
    modal.appendChild(nutrRow);

    const presets=(f.unit==="g"||f.unit==="ml")?(f.baseG<=10?[2,5,8,10,15,20]:f.baseG<=15?[5,10,15,20,30,50]:f.baseG<=30?[5,10,15,20,30,50]:f.baseG<=50?[15,25,50,75,100,150]:[50,100,150,200,250,300]):(f.unit==="EL"?[0.25,0.5,1,1.5,2,3]:[0.5,1,1.5,2,3]);
    const preRow=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"14px"}},
      ...presets.map(q=>h("button",{style:{padding:"6px 14px",borderRadius:"20px",border:Number(S.portionQty)===q?"2px solid "+C.primary:"1px solid #E5E7EB",background:Number(S.portionQty)===q?"#E8F5E9":"white",fontSize:"12px",fontWeight:600,color:Number(S.portionQty)===q?C.primary:C.text},onClick:()=>{S.portionQty=String(q);render()}},q+((f.unit==="g"||f.unit==="ml")?f.unit:f.unit==="EL"?" EL":"×")))
    );
    modal.appendChild(preRow);

    modal.appendChild(h("button",{style:{width:"100%",padding:"14px",background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:"white",border:"none",borderRadius:"14px",fontWeight:700,fontSize:"15px"},onClick:()=>{
      const finalQty=Number(S.portionQty)||f.baseG;
      const nutr2=calcFood(f,finalQty);
      const e={...nutr2,name:f.name+((f.unit==="g"||f.unit==="ml")?" ("+finalQty+f.unit+")":f.unit==="EL"?" ("+finalQty+" EL)":finalQty!==f.baseG?" (×"+finalQty+")":""),mealType:S.mealType,id:Date.now(),time:time(),foodKey:f.name};
      if(!S.meals[tk])S.meals[tk]=[];S.meals[tk].push(e);S.portionFood=null;S.portionQty="";S.search="";render();
    }},"✓ Hinzufügen als "+(MEAL_TYPES.find(m=>m.id===S.mealType)?.label||"")));

    bg.appendChild(modal);app.appendChild(bg);
  }

  restoreFocus();
}

render();
</script>
</body>
</html>
